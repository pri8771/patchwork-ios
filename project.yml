name: Patchwork
options:
  bundleIdPrefix: com.patchworkapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  PatchworkKit:
    path: .

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Patchwork:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Patchwork
    dependencies:
      - package: PatchworkKit
        product: PatchworkCore
      - package: PatchworkKit
        product: PatchworkGeo
      - package: PatchworkKit
        product: PatchworkData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patchworkapp.Patchwork
        INFOPLIST_FILE: Patchwork/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES

  PatchworkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PatchworkTests
    dependencies:
      - target: Patchwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patchworkapp.PatchworkTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Patchwork:
    build:
      targets:
        Patchwork: all
        PatchworkTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Patchwork/Resources/Patchwork.storekit
    test:
      config: Debug
      targets:
        - PatchworkTests
